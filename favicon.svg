<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <!-- Gold gradient -->
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#f0c060"/>
      <stop offset="50%"  stop-color="#d4a843"/>
      <stop offset="100%" stop-color="#a07820"/>
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Dark background -->
  <rect width="64" height="64" rx="10" fill="#0a0a0f"/>

  <!-- Hexagon outline -->
  <polygon
    points="32,4 56,17 56,47 32,60 8,47 8,17"
    fill="none"
    stroke="url(#gold)"
    stroke-width="1.5"
    opacity="0.9"
  />

  <!-- Inner hex (smaller, dimmer) -->
  <polygon
    points="32,10 50,20 50,44 32,54 14,44 14,20"
    fill="none"
    stroke="#d4a843"
    stroke-width="0.5"
    opacity="0.3"
  />

  <!-- Circuit lines — top-left -->
  <line x1="8" y1="17" x2="4" y2="17" stroke="#d4a843" stroke-width="1" opacity="0.6"/>
  <line x1="4" y1="17" x2="4" y2="12" stroke="#d4a843" stroke-width="1" opacity="0.6"/>
  <circle cx="4" cy="12" r="1.2" fill="#d4a843" opacity="0.8"/>

  <!-- Circuit lines — top-right -->
  <line x1="56" y1="17" x2="60" y2="17" stroke="#d4a843" stroke-width="1" opacity="0.6"/>
  <line x1="60" y1="17" x2="60" y2="12" stroke="#d4a843" stroke-width="1" opacity="0.6"/>
  <circle cx="60" cy="12" r="1.2" fill="#d4a843" opacity="0.8"/>

  <!-- Circuit lines — bottom -->
  <line x1="32" y1="60" x2="32" y2="63" stroke="#d4a843" stroke-width="1" opacity="0.6"/>
  <circle cx="32" cy="63" r="1.2" fill="#d4a843" opacity="0.8"/>

  <!-- Corner dots on hex vertices -->
  <circle cx="32" cy="4"  r="1.5" fill="url(#gold)" filter="url(#glow)"/>
  <circle cx="56" cy="17" r="1.5" fill="url(#gold)" filter="url(#glow)"/>
  <circle cx="56" cy="47" r="1.5" fill="url(#gold)" filter="url(#glow)"/>
  <circle cx="32" cy="60" r="1.5" fill="url(#gold)" filter="url(#glow)"/>
  <circle cx="8"  cy="47" r="1.5" fill="url(#gold)" filter="url(#glow)"/>
  <circle cx="8"  cy="17" r="1.5" fill="url(#gold)" filter="url(#glow)"/>

  <!-- NK monogram — centered -->
  <text
    x="32" y="40"
    font-family="Inter,Arial,sans-serif"
    font-size="20"
    font-weight="900"
    fill="url(#gold)"
    text-anchor="middle"
    letter-spacing="-1"
    filter="url(#glow)"
  >NK</text>

  <!-- Subtle scan line across middle -->
  <line x1="14" y1="32" x2="50" y2="32" stroke="#d4a843" stroke-width="0.4" opacity="0.2"/>
</svg>
